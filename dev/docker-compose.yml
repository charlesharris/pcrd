version: "3.9"

# Development environment: source and target PostgreSQL clusters.
# source_db has wal_level=logical enabled for pcrd replication.
#
# Usage:
#   docker compose -f dev/docker-compose.yml up -d
#   psql postgresql://postgres:postgres@localhost:5433/pcrd_source
#   psql postgresql://postgres:postgres@localhost:5434/pcrd_target

services:
  source_db:
    image: postgres:16
    environment:
      POSTGRES_DB: pcrd_source
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=10
        -c max_wal_senders=10
    volumes:
      - source_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  target_db:
    image: postgres:16
    environment:
      POSTGRES_DB: pcrd_target
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - target_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  source_data:
  target_data:
