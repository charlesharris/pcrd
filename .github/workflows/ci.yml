name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only token; this job only needs to check out and run tests.
permissions:
  contents: read

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      # Brings up the source (5433, wal_level=logical) and target (5434)
      # clusters the integration suite expects; --wait blocks on healthchecks.
      - name: Start PostgreSQL (source + target)
        run: docker compose -f dev/docker-compose.yml up -d --wait

      - name: Lint
        run: bundle exec rubocop

      - name: Test
        run: bundle exec rspec
