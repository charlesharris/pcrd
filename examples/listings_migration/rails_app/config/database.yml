default: &default
  adapter:  postgresql
  encoding: unicode
  pool:     <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  # DATABASE_URL overrides all settings when set (used in Docker).
  # Fallback for local development outside Docker.
  url: <%= ENV.fetch("DATABASE_URL", "postgres://postgres:postgres@localhost:5433/myapp_production") %>
